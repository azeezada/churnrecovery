# Wrangler config for deploying static assets (Next.js exported `out/` folder)
# See: https://developers.cloudflare.com/workers/platform/sites

name = "churnrecovery"
main = "workers-site/index.js"
compatibility_date = "2025-12-10"
compatibility_flags = ["nodejs_compat"]

[site]
# Directory generated by `npm run build` (Next.js static export)
bucket = "./out"

[observability]
[observability.logs]
enabled = true
head_sampling_rate = 1
invocation_logs = true
persist = true

# D1 Database for waitlist + analytics
# Create with: wrangler d1 create churnrecovery-db
# Then update the database_id below
[[d1_databases]]
binding = "DB"
database_name = "churnrecovery-db"
database_id = "PLACEHOLDER_NEEDS_REPLACEMENT_AFTER_DB_CREATION"
migrations_dir = "migrations"
